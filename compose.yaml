services:
  # ── Devel ────────────────────────────────────────────────
  devel:
    build:
      context: .
      dockerfile: Dockerfile
      target: devel
      args:
        APT_MIRROR_UBUNTU: ${APT_MIRROR_UBUNTU:-tw.archive.ubuntu.com}
    image: ${DOCKER_HUB_USER:-local}/urg_node_humble:devel
    container_name: urg_node_humble
    privileged: true
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    volumes:
      - /dev:/dev

  # ── Smoke test (ephemeral) ─────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        APT_MIRROR_UBUNTU: ${APT_MIRROR_UBUNTU:-tw.archive.ubuntu.com}
    image: ${DOCKER_HUB_USER:-local}/urg_node_humble:test
    profiles:
      - test
